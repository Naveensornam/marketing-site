<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketing Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navbar -->
  <header class="navbar">
    <img src="assets/logo.png" alt="Logo" class="logo">
    <nav>
      <a href="#features">Features</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-text">
      <h1>Grow Your Business with Us</h1>
      <p>Modern solutions for marketing success.</p>
      <button class="cta">Get Started</button>
    </div>
    <img src="assets/hero.jpg" alt="Hero Image">
  </section>

  <!-- Features -->
  <section id="features" class="features">
    <div class="feature">
      <h2>🚀 Fast Performance</h2>
      <p>Optimized for speed and reliability.</p>
    </div>
    <div class="feature">
      <h2>🎨 Modern Design</h2>
      <p>Clean, responsive, and elegant UI.</p>
    </div>
    <div class="feature">
      <h2>🔒 Secure</h2>
      <p>Built with best practices in mind.</p>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 Marketing Page. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
